name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # IMPORTANT for pushing to GitHub registry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Login to GitHub Container Registry (NOT Docker Hub)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Backend
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/deva-ansh-af/tidalbrix-backend:latest

      # ✅ Frontend
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/deva-ansh-af/tidalbrix-frontend:latest

      # ✅ Worker
      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ghcr.io/deva-ansh-af/tidalbrix-worker:latest
